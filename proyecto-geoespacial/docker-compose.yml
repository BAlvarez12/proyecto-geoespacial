services:
  db:
    image: postgis/postgis:16-3.4
    container_name: proyecto-geoespacial-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432"]
      interval: 4s
      timeout: 5s
      retries: 12
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - geo_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proyecto-geoespacial-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      # Dentro de la red Docker el host es el nombre del servicio, no localhost.
      DB_HOST: db
      # Puerto interno del contenedor PostGIS (siempre 5432 en la red compose).
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - geo_network

  proxy:
    image: nginx:stable-alpine
    container_name: proyecto-geoespacial-proxy
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - geo_network

volumes:
  postgres_data:

networks:
  geo_network:
    driver: bridge